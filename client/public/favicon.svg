<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1a1a18" />
  <!-- BotMessageSquare: message bubble -->
  <rect x="5" y="5" width="18" height="14" rx="3" fill="none" stroke="#1a7a5e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- bot face dots -->
  <circle cx="10" cy="12" r="1.2" fill="#1a7a5e"/>
  <circle cx="14" cy="12" r="1.2" fill="#1a7a5e"/>
  <circle cx="18" cy="12" r="1.2" fill="#1a7a5e"/>
  <!-- bubble tail -->
  <path d="M9 19 L7 23 L13 19" fill="none" stroke="#1a7a5e" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- antenna -->
  <line x1="14" y1="5" x2="14" y2="3" stroke="#1a7a5e" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="14" cy="2.5" r="1" fill="#1a7a5e"/>
</svg>
